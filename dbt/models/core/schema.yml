version: 2

models:

  - name: dim_team
    description: >
      Silver team dimension. One row per NHL team. team_id is the NHL API's
      stable integer identifier and serves as the PK. When a second sport is
      onboarded an ADR will address cross-sport key uniqueness. league_id is
      hardcoded to 1 (NHL); sport_id propagates through dim_league. Arena and
      geography columns are nullable — not available in bronze; populate from
      a future enrichment source.
    columns:
      - name: team_id
        description: >
          NHL API team identifier (stable integer). PK for this table and the
          FK used by fct_game, fct_game_outcome, fct_game_event, and
          fct_game_lineup.
        tests:
          - unique
          - not_null
      - name: league_id
        description: FK to dim_league.league_id. Always 1 (NHL) for current data.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_id
      - name: team_abbrev
        description: >
          Most recent three-letter abbreviation (e.g. "TBL"). Reflects the
          latest game appearance in bronze.
        tests:
          - not_null
      - name: team_full_name
        description: >
          Most recent full team name (e.g. "Tampa Bay Lightning"). Null only
          if the team never appeared in a team_summary bronze pull.
      - name: external_ids
        description: >
          JSON object carrying source-system identifiers for cross-source joins.
          Always contains nhl_api_team_id. Example: {"nhl_api_team_id": 14}.
        tests:
          - not_null
      - name: arena_name
        description: Home arena name. Null — not in bronze; populate from enrichment.
      - name: city
        description: City. Null — not in bronze; populate from enrichment.
      - name: state_province
        description: State or province. Null — not in bronze.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code. Null — not in bronze.

  - name: dim_player
    description: >
      Silver player dimension. One row per NHL player. player_id is the NHL
      API's stable integer identifier and serves as the PK. No league_id FK:
      a player can appear in multiple leagues (e.g. AHL call-up → NHL); the
      league association lives in fct_game_lineup. Demographics come from the
      most recent roster pull and are null for players who appear only in
      season summary data. full_name is always populated.
    columns:
      - name: player_id
        description: >
          NHL API player identifier (stable integer). PK for this table and
          the FK used by fct_game_lineup and fct_game_event.
        tests:
          - unique
          - not_null
      - name: full_name
        description: >
          Player full name. Derived from first_name + last_name when available;
          falls back to skater_full_name or goalie_full_name from summary tables.
        tests:
          - not_null
      - name: first_name
        description: Player first name from the most recent roster row. Null if no roster row.
      - name: last_name
        description: Player last name from the most recent roster row. Null if no roster row.
      - name: position_group
        description: >
          Coarse position group: F (forward), D (defenseman), G (goalie).
          Roster-authoritative; inferred from summary tables as fallback.
        tests:
          - accepted_values:
              arguments:
                values: ['F', 'D', 'G']
      - name: position_code
        description: >
          Fine-grained position code: C, L, R (forwards), D (defenseman), G (goalie).
          From roster; falls back to skater_summary.
      - name: shoots_catches
        description: "Shooting/catching handedness: L or R. Null if no roster row."
      - name: height_in
        description: Height in inches. Null if no roster row.
      - name: weight_lb
        description: Weight in pounds. Null if no roster row.
      - name: birth_date
        description: >
          Date of birth. Null if no roster row, or if the roster itself has null
          (rare for some international players).
      - name: birth_country
        description: >
          ISO 3166-1 alpha-3 birth country code (e.g. "CAN", "USA").
          Null if no roster row.
      - name: external_ids
        description: >
          JSON object carrying source-system identifiers. Always contains
          nhl_api_player_id. Example: {"nhl_api_player_id": 8478402}.
        tests:
          - not_null

  - name: fct_game
    description: >
      Game spine. One row per finished NHL game (game_type 2 or 3). The
      authoritative source for game-level metadata; fct_game_outcome,
      fct_game_event, and fct_game_lineup all FK to game_id here.
      league_id is always 1 (NHL) for current data; sport_id propagates
      through dim_league. venue_team_id equals home_team_id by convention —
      landing carries venue_name but no venue FK.
    columns:
      - name: game_id
        description: >
          NHL game identifier (BIGINT). PK for this table and the FK used
          by fct_game_outcome, fct_game_event, and fct_game_lineup.
        tests:
          - unique
          - not_null
      - name: league_id
        description: FK to dim_league.league_id. Always 1 (NHL) for current data.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_id
      - name: season
        description: Eight-character season string (e.g. "20242025").
        tests:
          - not_null
      - name: game_datetime_utc
        description: Scheduled game start time in UTC (TIMESTAMPTZ).
        tests:
          - not_null
      - name: home_team_id
        description: FK to dim_team.team_id for the home team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: away_team_id
        description: FK to dim_team.team_id for the away team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: venue_team_id
        description: >
          FK to dim_team.team_id for the venue host (equals home_team_id).
          Included as a distinct column to support future enrichment from a
          dedicated venue source where neutral-site games may differ.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: game_type
        description: "2 = regular season, 3 = playoffs."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2, 3]
      - name: status
        description: >
          Final game state from bronze. Only FINAL and OFF reach silver
          (the staging layer filters to INGESTIBLE_GAME_STATES).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['FINAL', 'OFF']

  - name: fct_game_outcome
    description: >
      Game outcome. One row per finished NHL game. Carries final scores,
      the winning team, the period in which the game ended, and a boolean
      home_win flag. Sourced entirely from stg_nhl__landing; no bronze
      re-read. Ties are not possible — landing is pre-filtered to FINAL/OFF
      game states, guaranteeing a decided winner.
    columns:
      - name: game_id
        description: >
          FK to fct_game.game_id and NHL game identifier. PK for this table
          (one outcome per game).
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('fct_game')
                field: game_id
      - name: home_goals
        description: Home team final goal count.
        tests:
          - not_null
      - name: away_goals
        description: Away team final goal count.
        tests:
          - not_null
      - name: winning_team_id
        description: FK to dim_team.team_id for the winning team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: period_end
        description: >
          Period type in which the game ended: REG (regulation), OT
          (overtime), or SO (shootout). Maps directly from
          stg_nhl__landing.final_period_type.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REG', 'OT', 'SO']
      - name: home_win
        description: True if the home team won; false if the away team won.
        tests:
          - not_null
