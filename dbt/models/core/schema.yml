version: 2

models:

  - name: dim_team
    description: >
      Silver team dimension. One row per NHL team. team_id is the NHL API's
      stable integer identifier and serves as the PK. When a second sport is
      onboarded an ADR will address cross-sport key uniqueness. league_id is
      hardcoded to 1 (NHL); sport_id propagates through dim_league. Arena and
      geography columns are nullable — not available in bronze; populate from
      a future enrichment source.
    columns:
      - name: team_id
        description: >
          NHL API team identifier (stable integer). PK for this table and the
          FK used by fct_game, fct_game_outcome, fct_game_event, and
          fct_game_lineup.
        tests:
          - unique
          - not_null
      - name: league_id
        description: FK to dim_league.league_id. Always 1 (NHL) for current data.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_id
      - name: team_abbrev
        description: >
          Most recent three-letter abbreviation (e.g. "TBL"). Reflects the
          latest game appearance in bronze.
        tests:
          - not_null
      - name: team_full_name
        description: >
          Most recent full team name (e.g. "Tampa Bay Lightning"). Null only
          if the team never appeared in a team_summary bronze pull.
      - name: external_ids
        description: >
          JSON object carrying source-system identifiers for cross-source joins.
          Always contains nhl_api_team_id. Example: {"nhl_api_team_id": 14}.
        tests:
          - not_null
      - name: arena_name
        description: Home arena name. Null — not in bronze; populate from enrichment.
      - name: city
        description: City. Null — not in bronze; populate from enrichment.
      - name: state_province
        description: State or province. Null — not in bronze.
      - name: country_code
        description: ISO 3166-1 alpha-2 country code. Null — not in bronze.

  - name: dim_player
    description: >
      Silver player dimension. One row per NHL player. player_id is the NHL
      API's stable integer identifier and serves as the PK. No league_id FK:
      a player can appear in multiple leagues (e.g. AHL call-up → NHL); the
      league association lives in fct_game_lineup. Demographics come from the
      most recent roster pull and are null for players who appear only in
      season summary data. full_name is always populated.
    columns:
      - name: player_id
        description: >
          NHL API player identifier (stable integer). PK for this table and
          the FK used by fct_game_lineup and fct_game_event.
        tests:
          - unique
          - not_null
      - name: full_name
        description: >
          Player full name. Derived from first_name + last_name when available;
          falls back to skater_full_name or goalie_full_name from summary tables.
        tests:
          - not_null
      - name: first_name
        description: Player first name from the most recent roster row. Null if no roster row.
      - name: last_name
        description: Player last name from the most recent roster row. Null if no roster row.
      - name: position_group
        description: >
          Coarse position group: F (forward), D (defenseman), G (goalie).
          Roster-authoritative; inferred from summary tables as fallback.
        tests:
          - accepted_values:
              arguments:
                values: ['F', 'D', 'G']
      - name: position_code
        description: >
          Fine-grained position code: C, L, R (forwards), D (defenseman), G (goalie).
          From roster; falls back to skater_summary.
      - name: shoots_catches
        description: "Shooting/catching handedness: L or R. Null if no roster row."
      - name: height_in
        description: Height in inches. Null if no roster row.
      - name: weight_lb
        description: Weight in pounds. Null if no roster row.
      - name: birth_date
        description: >
          Date of birth. Null if no roster row, or if the roster itself has null
          (rare for some international players).
      - name: birth_country
        description: >
          ISO 3166-1 alpha-3 birth country code (e.g. "CAN", "USA").
          Null if no roster row.
      - name: external_ids
        description: >
          JSON object carrying source-system identifiers. Always contains
          nhl_api_player_id. Example: {"nhl_api_player_id": 8478402}.
        tests:
          - not_null

  - name: fct_game
    description: >
      Game spine. One row per finished NHL game (game_type 2 or 3). The
      authoritative source for game-level metadata; fct_game_outcome,
      fct_game_event, and fct_game_lineup all FK to game_id here.
      league_id is always 1 (NHL) for current data; sport_id propagates
      through dim_league. venue_team_id equals home_team_id by convention —
      landing carries venue_name but no venue FK.
    columns:
      - name: game_id
        description: >
          NHL game identifier (BIGINT). PK for this table and the FK used
          by fct_game_outcome, fct_game_event, and fct_game_lineup.
        tests:
          - unique
          - not_null
      - name: league_id
        description: FK to dim_league.league_id. Always 1 (NHL) for current data.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_id
      - name: season
        description: Eight-character season string (e.g. "20242025").
        tests:
          - not_null
      - name: game_datetime_utc
        description: Scheduled game start time in UTC (TIMESTAMPTZ).
        tests:
          - not_null
      - name: home_team_id
        description: FK to dim_team.team_id for the home team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: away_team_id
        description: FK to dim_team.team_id for the away team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: venue_team_id
        description: >
          FK to dim_team.team_id for the venue host (equals home_team_id).
          Included as a distinct column to support future enrichment from a
          dedicated venue source where neutral-site games may differ.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: game_type
        description: "2 = regular season, 3 = playoffs."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2, 3]
      - name: status
        description: >
          Final game state from bronze. Only FINAL and OFF reach silver
          (the staging layer filters to INGESTIBLE_GAME_STATES).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['FINAL', 'OFF']

  - name: fct_game_outcome
    description: >
      Game outcome. One row per finished NHL game. Carries final scores,
      the winning team, the period in which the game ended, and a boolean
      home_win flag. Sourced entirely from stg_nhl__landing; no bronze
      re-read. Ties are not possible — landing is pre-filtered to FINAL/OFF
      game states, guaranteeing a decided winner.
    columns:
      - name: game_id
        description: >
          FK to fct_game.game_id and NHL game identifier. PK for this table
          (one outcome per game).
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('fct_game')
                field: game_id
      - name: home_goals
        description: Home team final goal count.
        tests:
          - not_null
      - name: away_goals
        description: Away team final goal count.
        tests:
          - not_null
      - name: winning_team_id
        description: FK to dim_team.team_id for the winning team.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: period_end
        description: >
          Period type in which the game ended: REG (regulation), OT
          (overtime), or SO (shootout). Maps directly from
          stg_nhl__landing.final_period_type.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['REG', 'OT', 'SO']
      - name: home_win
        description: True if the home team won; false if the away team won.
        tests:
          - not_null

  - name: fct_game_event
    description: >
      Sport-agnostic game event table. One row per play-by-play event across
      all finished NHL games. event_id is a stable composite of game_id and
      the NHL API's sequential eventId within that game.

      event_type maps NHL typeDescKey to a generic vocabulary
      (hyphen-to-underscore, with shot-on-goal aliased to shot). Unknown
      future event types inherit the replace pattern.

      Three structural events (period_start, period_end, game_end) carry no
      details block (ADR-0003 D3); team_id, coordinates, and player IDs are
      null for those rows by design. All other null player/coord fields are
      normal — not every event has both participants or ice coordinates.

      situationCode (power-play state) is not captured here; add it when
      M5 feature engineering requires it.
    columns:
      - name: event_id
        description: >
          Stable surrogate PK. Composite of game_id and NHL API eventId,
          formatted as "{game_id}_{event_sequence}".
        tests:
          - unique
          - not_null
      - name: game_id
        description: FK to fct_game.game_id.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_game')
                field: game_id
      - name: period
        description: >
          Period number. 1–3 for regulation, 4+ for overtime periods.
          Shootout events appear in period 5 for regular-season games.
        tests:
          - not_null
      - name: period_time_elapsed_s
        description: >
          Seconds elapsed within the period at the time of the event.
          Derived from timeInPeriod (MM:SS). 0 for period-start events,
          up to 1200 (20:00) for regulation periods.
        tests:
          - not_null
      - name: event_type
        description: >
          Generic event type. Mapped from NHL typeDescKey using
          hyphen-to-underscore replacement; shot-on-goal is aliased to
          shot. Common values: shot, goal, penalty, faceoff, hit,
          blocked_shot, missed_shot, giveaway, takeaway, stoppage,
          period_start, period_end, game_end.
        tests:
          - not_null
      - name: x_coord
        description: >
          Ice x-coordinate of the event (-100 to 100). Null for structural
          events (period_start, period_end, game_end) and some stoppages.
      - name: y_coord
        description: >
          Ice y-coordinate of the event (-42 to 42). Null for the same
          event types as x_coord.
      - name: team_id
        description: >
          FK to dim_team.team_id for the event-owning team. Null for
          structural events. Maps from details.eventOwnerTeamId.
        tests:
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: primary_player_id
        description: >
          FK to dim_player.player_id for the primary participant. Resolution
          order: scorer > shooter > hitter > blocker > faceoff winner >
          penalty committer > generic player. Null for structural events
          and events with no identified primary participant.
        tests:
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: secondary_player_id
        description: >
          FK to dim_player.player_id for the secondary participant.
          Resolution order: first assist > goalie in net > hittee >
          faceoff loser > penalty drawer. Null for most event types.
        tests:
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: details_json
        description: >
          Verbatim details sub-object from the NHL API play element as
          JSON text. Contains all event-specific fields not promoted to
          top-level columns (e.g. assist2PlayerId, shotType, reason,
          descKey, duration). Null for structural events.

  - name: fct_game_lineup
    description: >
      Sport-agnostic per-player game participation table. One row per
      (game_id, player_id) covering all skaters (position_type F/D) and goalies
      (position_type G) who appear in the boxscore for finished NHL games.

      Columns that apply only to one role are null for the other: saves and
      goals_against are null for skaters; goals, assists, and shots are null for
      goalies. Scratch goalies (toi_s = 0) are included — the boxscore API lists
      them with zero stats.

      lineup_id is a stable surrogate PK composed of game_id and player_id,
      following the same pattern as event_id in fct_game_event. Line and pairing
      assignments are not available from M2 bronze; add them when a future data
      source provides them.
    columns:
      - name: lineup_id
        description: >
          Stable surrogate PK. Composite of game_id and player_id, formatted as
          "{game_id}_{player_id}". Unique across the full dataset because a player
          appears at most once per game.
        tests:
          - unique
          - not_null
      - name: game_id
        description: FK to fct_game.game_id.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_game')
                field: game_id
      - name: team_id
        description: FK to dim_team.team_id for the team the player appeared for.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: player_id
        description: FK to dim_player.player_id.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: position_type
        description: "Coarse position group: F (forward), D (defenseman), G (goalie)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['F', 'D', 'G']
      - name: toi_s
        description: >
          Time on ice in seconds. Converted from the NHL API's MM:SS string.
          0 for scratch goalies; positive for all other players.
        tests:
          - not_null
      - name: goals
        description: Goals scored. Null for goalies.
      - name: assists
        description: Assists recorded. Null for goalies.
      - name: shots
        description: Shots on goal (sog in the NHL API). Null for goalies.
      - name: saves
        description: Saves made. Null for skaters. 0 for scratch goalies.
      - name: goals_against
        description: Goals allowed. Null for skaters. 0 for scratch goalies.
