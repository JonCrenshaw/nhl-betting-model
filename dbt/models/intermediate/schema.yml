version: 2

models:

  - name: int_nhl__team_spine
    description: >
      One row per NHL team observed in bronze data. Derives team_id (NHL API
      integer, stable across seasons) and the most recent team_abbrev and
      team_full_name. Franchise events — VGK expansion (2017–18), SEA expansion
      (2021–22), ARI→UTA relocation (2024–25) — require no special mapping
      because the NHL API assigns each franchise a distinct team_id. Consumed
      only by dim_team.
    columns:
      - name: team_id
        description: NHL API team identifier. Stable integer; unique within NHL.
        tests:
          - unique
          - not_null
      - name: team_abbrev
        description: >
          Most recent three-letter abbreviation (e.g. "TBL"). Reflects the
          latest game appearance in stg_nhl__landing.
        tests:
          - not_null
      - name: team_full_name
        description: >
          Most recent full team name from stg_nhl__team_summary (e.g.
          "Tampa Bay Lightning"). Null if the team never appeared in a
          team_summary bronze pull — investigate if this occurs.

  - name: int_nhl__player_spine
    description: >
      One row per NHL player observed across roster, skater summary, and goalie
      summary. Demographics (height, weight, birth_date, birth_country) come
      from the most recent roster row, which is the richest demographic source.
      Players present in season summary but absent from roster have null
      demographics — typically unsigned/callup players. Position is derived
      from roster first, then inferred from summary position_code. Consumed
      only by dim_player. fct_game_lineup (PR-F) will add players seen only
      in boxscore JSON.
    columns:
      - name: player_id
        description: NHL API player identifier. Stable integer; unique within NHL.
        tests:
          - unique
          - not_null
      - name: full_name
        description: >
          Player full name. Derived from roster first_name + last_name;
          falls back to skater_full_name or goalie_full_name from summary
          tables. Null only if no name appears in any source (unexpected).
        tests:
          - not_null
      - name: first_name
        description: Player first name from roster. Null if player has no roster row.
      - name: last_name
        description: Player last name from roster. Null if player has no roster row.
      - name: position_group
        description: >
          Coarse position group: F (forward), D (defenseman), G (goalie).
          Derived from roster position_group first; inferred from
          skater/goalie summary as fallback.
        tests:
          - accepted_values:
              arguments:
                values: ['F', 'D', 'G']
      - name: position_code
        description: >
          Fine-grained position: C, L, R (forwards), D (defenseman), G (goalie).
          From roster; falls back to skater_summary position_code.
      - name: shoots_catches
        description: "Handedness: L or R. From roster only; null if no roster row."
      - name: height_in
        description: Height in inches. From roster; null if no roster row.
      - name: weight_lb
        description: Weight in pounds. From roster; null if no roster row.
      - name: birth_date
        description: >
          Date of birth. From roster; null if no roster row or if the
          roster row itself has a null (rare for international players).
      - name: birth_country
        description: >
          ISO 3166-1 alpha-3 birth country code (e.g. "CAN", "USA").
          From roster; null if no roster row.

  - name: int_nhl__game_skater_stats
    description: >
      One row per (game_id, player_id) for all skaters (forwards and defensemen)
      who appear in the boxscore playerByGameStats array. Sourced from
      stg_nhl__boxscore; both teams' forwards and defense arrays are unnested and
      unioned. position_type is derived from the array group (F for forwards, D
      for defense), not from the player's position field. Consumed only by
      fct_game_lineup.
    columns:
      - name: game_id
        description: FK to fct_game.game_id.
        tests:
          - not_null
      - name: team_id
        description: NHL API team identifier for the team the skater played for.
        tests:
          - not_null
      - name: player_id
        description: NHL API player identifier.
        tests:
          - not_null
      - name: position_type
        description: "Coarse position group derived from the boxscore array: F (forward) or D (defenseman)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['F', 'D']
      - name: toi_s
        description: Time on ice in seconds, converted from the API's MM:SS string.
        tests:
          - not_null
      - name: goals
        description: Goals scored by the skater in this game.
      - name: assists
        description: Assists recorded by the skater in this game.
      - name: shots
        description: Shots on goal (sog in the NHL API) by the skater in this game.

  - name: int_nhl__game_goalie_stats
    description: >
      One row per (game_id, player_id) for all goalies who appear in the boxscore
      playerByGameStats.goalies array. Both teams' goalie arrays are unnested and
      unioned. Scratch goalies (starter: false, toi: "00:00") are included with
      toi_s = 0, saves = 0, and goals_against = 0 — the API always populates
      these fields. Consumed only by fct_game_lineup.
    columns:
      - name: game_id
        description: FK to fct_game.game_id.
        tests:
          - not_null
      - name: team_id
        description: NHL API team identifier for the team the goalie played for.
        tests:
          - not_null
      - name: player_id
        description: NHL API player identifier.
        tests:
          - not_null
      - name: position_type
        description: Always G (goalie).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['G']
      - name: toi_s
        description: Time on ice in seconds, converted from the API's MM:SS string. 0 for scratch goalies.
        tests:
          - not_null
      - name: saves
        description: Saves made by the goalie in this game. 0 for scratch goalies.
      - name: goals_against
        description: Goals allowed by the goalie in this game. 0 for scratch goalies.
